<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Foxling is a new way to store and retrieve your notes, thoughts, ideas, and bookmarks."
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />
    <link rel="canonical" href="https://foxlingapp.com/" />
    <script>
      (() => {
        try {
          const colors = {
            dark: "#1b1e1f",
            light: "#f8f9fa",
          };
          const storedTheme = localStorage.getItem("foxling-theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : window.matchMedia?.("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";

          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.backgroundColor =
            colors[theme] || colors.dark;
        } catch {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.style.backgroundColor = "#1b1e1f";
        }
      })();
    </script>
    <title>Foxling: beautiful notes app with tag system</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
